<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pinnacle Beef — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #ffffff;
      font-family: 'Montserrat', sans-serif;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
    }

    .content {
      max-width: 520px;
      width: 100%;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap img {
      width: 220px;
      display: block;
      margin: 0 auto 2rem;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .rule span {
      display: block;
      width: 60px;
      height: 1px;
    }
    .rule span:first-child { background: linear-gradient(to right, transparent, #9a3030); }
    .rule span:last-child  { background: linear-gradient(to left,  transparent, #9a3030); }
    .rule-diamond {
      width: 6px; height: 6px;
      background: #9a3030;
      transform: rotate(45deg);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }

    .sub {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #9a3030;
      margin-bottom: 1.2rem;
    }

    .desc {
      font-size: 14px;
      color: #666;
      line-height: 1.9;
      font-weight: 300;
      margin-bottom: 2.8rem;
    }

    .contact-btn {
      display: inline-block;
      background: #9a3030;
      color: #fff;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 15px 44px;
      border: 1px solid #9a3030;
      transition: background 0.3s, color 0.3s;
      margin-bottom: 3rem;
    }

    .contact-btn:hover { background: #7a2020; border-color: #7a2020; }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid #e0e0e0;
      padding-top: 2rem;
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      color: #555;
    }

    .contact-row a {
      color: #9a3030;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-row a:hover { color: #7a2020; }

    .footer {
      margin-top: 2.5rem;
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="content">

    <div class="logo-wrap">
      <img src="Logo_PinnacleBeef.png" alt="Pinnacle Beef Logo" />
    </div>

    <div class="rule">
      <span></span>
      <div class="rule-diamond"></div>
      <span></span>
    </div>

    <h1>Coming<br>Soon</h1>
    <p class="sub">Something exceptional is on its way</p>
    <p class="desc">We are crafting a premium experience for you.<br>Our website is currently under construction.</p>

    <a href="mailto:Info@Pinnaclebeef.co.za" class="contact-btn">Contact Us</a>

    <div class="contacts">
      <div class="contact-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9a3030" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <a href="mailto:Info@Pinnaclebeef.co.za">Info@Pinnaclebeef.co.za</a>
      </div>
      <div class="contact-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9a3030" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.05 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16h1z"/></svg>
        <a href="tel:0875500691">087 550 0691</a>
      </div>
    </div>

    <p class="footer">© 2026 Pinnacle Beef — All Rights Reserved</p>

  </div>
</body>
</html>
